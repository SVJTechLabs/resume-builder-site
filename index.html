<title>ResumeForge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1c1c2e;--paper:#f7f5f0;--cream:#ece8df;--accent:#b84c2e;--accent2:#d4633f;--gold:#b8922a;--muted:#7a7a95;--border:#d5d0c8;--white:#fff;--sidebar:340px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
button{cursor:pointer;font-family:inherit}
/* HEADER */
header{background:var(--ink);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:fixed;top:0;left:0;right:0;z-index:200;border-bottom:2px solid var(--accent)}
.logo{font-size:20px;font-weight:800;letter-spacing:.02em;font-family:Georgia,serif}.logo span{color:var(--accent)}
.hbtns{display:flex;gap:10px}
.btn{padding:8px 18px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;transition:.2s}
.btn-ghost{background:transparent;border:1.5px solid rgba(255,255,255,.3);color:#fff}.btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.1)}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{filter:brightness(1.1)}
/* LAYOUT */
.app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh;padding-top:56px}
/* SIDEBAR */
.sidebar{background:#fff;border-right:1px solid var(--border);height:calc(100vh - 56px);overflow-y:auto;position:sticky;top:56px}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* progress */
.pg-wrap{padding:14px 20px 0}
.pg-top{display:flex;justify-content:space-between;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.pg-bar{height:3px;background:var(--cream);border-radius:2px}
.pg-fill{height:100%;background:var(--accent);border-radius:2px;transition:.4s}
/* tabs */
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--cream)}
.tabs::-webkit-scrollbar{height:0}
.tab{flex:1;min-width:58px;padding:11px 5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);background:#fff}
.tab:hover:not(.on){color:var(--ink);background:rgba(0,0,0,.03)}
/* panels */
.panel{display:none;padding:18px}
.panel.on{display:block}
.sec-h{font-family:Georgia,serif;font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1.5px solid var(--cream)}
/* form */
.fg{margin-bottom:13px}
label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px}
input,textarea{width:100%;font-family:inherit;font-size:13px;color:var(--ink);background:var(--paper);border:1.5px solid var(--border);border-radius:5px;padding:8px 10px;outline:none;transition:.2s}
input:focus,textarea:focus{border-color:var(--accent);background:#fff}
textarea{resize:vertical;min-height:84px;line-height:1.65}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* cards */
.card{background:var(--paper);border:1.5px solid var(--border);border-radius:7px;padding:13px;margin-bottom:11px;animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.clbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.rm{background:none;border:none;font-size:18px;color:var(--muted);padding:2px 6px;border-radius:3px;line-height:1;transition:.2s}.rm:hover{color:var(--accent)}
.addb{width:100%;padding:10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);background:rgba(184,76,46,.05);border:1.5px dashed var(--accent);border-radius:5px;transition:.2s;margin-top:5px}.addb:hover{background:rgba(184,76,46,.12)}
/* skills */
.sk-row{display:flex;gap:7px;margin-bottom:10px}.sk-row input{flex:1}
.asm{padding:8px 13px;font-size:12px;font-weight:700;background:var(--ink);color:#fff;border:none;border-radius:5px}.asm:hover{background:var(--accent)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{display:inline-flex;align-items:center;gap:5px;background:var(--ink);color:#fff;font-size:11.5px;font-weight:500;padding:4px 10px;border-radius:16px}
.tx{opacity:.6;font-size:14px;cursor:pointer;line-height:1}.tx:hover{opacity:1}
.ptags .tag{background:var(--cream);color:var(--ink);border:1.5px solid var(--border);cursor:pointer}.ptags .tag:hover{border-color:var(--accent);color:var(--accent)}
/* themes */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.th{border:2px solid var(--border);border-radius:7px;padding:9px 5px;text-align:center;cursor:pointer;font-size:10px;font-weight:700;transition:.2s}.th:hover,.th.on{border-color:var(--accent);background:rgba(184,76,46,.05)}
.sw{width:26px;height:26px;border-radius:50%;margin:0 auto 5px;border:2px solid rgba(0,0,0,.1)}
.vr{display:flex;flex-direction:column;gap:9px}
.vr label{display:flex;align-items:center;gap:9px;text-transform:none;letter-spacing:0;font-size:13px;cursor:pointer;font-weight:400;color:var(--ink)}
.vr input[type=checkbox]{width:auto;accent-color:var(--accent)}
/* PREVIEW */
.preview{background:#d8d3cc;overflow-y:auto;padding:26px 18px;display:flex;flex-direction:column;align-items:center}
.plbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;align-self:flex-start}
/* RESUME DOC */
#rdoc{background:#fff;width:750px;min-height:1060px;box-shadow:0 6px 32px rgba(0,0,0,.18);font-family:'Segoe UI',system-ui,sans-serif;font-size:12.5px;--ra:#1c1c2e;--rhb:#1c1c2e;--rht:#fff}
.t-terra #rdoc{--ra:#b84c2e;--rhb:#b84c2e;--rht:#fff}
.t-navy  #rdoc{--ra:#1b3a6b;--rhb:#1b3a6b;--rht:#fff}
.t-green #rdoc{--ra:#2d5a3d;--rhb:#2d5a3d;--rht:#fff}
.t-slate #rdoc{--ra:#3d4f6b;--rhb:#edf1f8;--rht:#1c2a42}
.t-gold  #rdoc{--ra:#92400e;--rhb:#78350f;--rht:#fffbeb}
/* resume header */
.rh{background:var(--rhb);color:var(--rht);padding:34px 42px 30px}
.rname{font-family:Georgia,serif;font-size:30px;font-weight:700;line-height:1.1;margin-bottom:4px}
.rtl{font-size:13.5px;opacity:.85;margin-bottom:15px;font-weight:400}
.rct{display:flex;flex-wrap:wrap;gap:4px 16px;font-size:11px;opacity:.9}
.ci{display:flex;align-items:center;gap:4px}
/* resume body */
.rb{padding:26px 42px}
.rs{margin-bottom:22px}
.rst{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.13em;color:var(--ra);border-bottom:1.5px solid var(--ra);padding-bottom:5px;margin-bottom:11px}
.rsum{font-size:12.5px;line-height:1.75;color:#333}
/* work */
.wi{margin-bottom:15px}
.wh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
.wtl{font-size:13px;font-weight:700;color:#111}
.wdt{font-size:11px;color:#666;font-family:'Courier New',monospace;white-space:nowrap}
.wco{font-size:12px;color:var(--ra);font-weight:600;margin-bottom:4px}
.wbul{padding-left:14px}
.wbul li{font-size:12px;line-height:1.7;color:#444;margin-bottom:2px}
/* edu */
.ei{margin-bottom:11px}
.edg{font-size:13px;font-weight:700;color:#111}
.esc{font-size:12px;color:var(--ra);font-weight:600}
.edt{font-size:11px;color:#666;font-family:'Courier New',monospace;margin-top:2px}
/* skills */
.skg{display:grid;grid-template-columns:repeat(3,1fr);gap:4px 16px}
.ski{font-size:12px;color:#333;padding:3px 0;display:flex;align-items:center;gap:5px}
.skd{width:5px;height:5px;border-radius:50%;background:var(--ra);flex-shrink:0}
/* projects */
.pji{margin-bottom:13px}
.pjn{font-size:13px;font-weight:700;color:#111}
.pjt{font-size:9.5px;color:var(--ra);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.pjd{font-size:12px;line-height:1.7;color:#444}
/* certs */
.cri{display:flex;justify-content:space-between;margin-bottom:8px;align-items:baseline;gap:8px}
.crn{font-size:12.5px;font-weight:600;color:#111}
.cr2{font-size:11px;color:#666}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:12px 17px;border-radius:6px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(7px);transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:none}
/* PRINT */
@media print{
  header,.sidebar,.plbl{display:none!important}
  .app{display:block;padding:0}
  .preview{padding:0;background:#fff;display:block}
  #rdoc{width:100%;box-shadow:none;min-height:auto}
}
</style>
</head>
<body class="t-classic">
<header>
  <div class="logo">Resume<span>Forge</span></div>
  <div class="hbtns">
    <button class="btn btn-ghost" onclick="resetAll()">&#x21BA; Reset</button>
    <button class="btn btn-gold" onclick="doPrint()">&#11015; Save as PDF</button>
  </div>
</header>
<div class="app">
<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="pg-wrap">
    <div class="pg-top"><span>Completion</span><span id="ppct">0%</span></div>
    <div class="pg-bar"><div class="pg-fill" id="pfill" style="width:0"></div></div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="goTab('basics',this)">Basics</button>
    <button class="tab" onclick="goTab('work',this)">Work</button>
    <button class="tab" onclick="goTab('edu',this)">Edu</button>
    <button class="tab" onclick="goTab('skills',this)">Skills</button>
    <button class="tab" onclick="goTab('proj',this)">Projects</button>
    <button class="tab" onclick="goTab('certs',this)">Certs</button>
    <button class="tab" onclick="goTab('design',this)">Design</button>
  </div>
  <!-- BASICS -->
  <div class="panel on" id="p-basics">
    <div class="sec-h">Personal Information</div>
    <div class="fg"><label>Full Name *</label><input id="fn" placeholder="e.g. Priya Sharma" oninput="render()"></div>
    <div class="fg"><label>Professional Title</label><input id="ft" placeholder="e.g. Senior Software Engineer" oninput="render()"></div>
    <div class="r2">
      <div class="fg"><label>Email *</label><input id="fe" type="email" placeholder="you@email.com" oninput="render()"></div>
      <div class="fg"><label>Phone</label><input id="fp" placeholder="+91 98765 43210" oninput="render()"></div>
    </div>
    <div class="r2">
      <div class="fg"><label>Location</label><input id="fl" placeholder="Hyderabad, India" oninput="render()"></div>
      <div class="fg"><label>LinkedIn</label><input id="fli" placeholder="linkedin.com/in/priya" oninput="render()"></div>
    </div>
    <div class="r2">
      <div class="fg"><label>GitHub / Portfolio</label><input id="fg2" placeholder="github.com/priya" oninput="render()"></div>
      <div class="fg"><label>Website</label><input id="fw" placeholder="priya.dev" oninput="render()"></div>
    </div>
    <div class="fg"><label>Professional Summary</label>
      <textarea id="fs" placeholder="2-4 sentences: your experience, key skills, and the value you bring..." oninput="render()"></textarea>
    </div>
  </div>
  <!-- WORK -->
  <div class="panel" id="p-work">
    <div class="sec-h">Work Experience</div>
    <div id="wlist"></div>
    <button class="addb" onclick="addW()">+ Add Work Experience</button>
  </div>
  <!-- EDU -->
  <div class="panel" id="p-edu">
    <div class="sec-h">Education</div>
    <div id="elist"></div>
    <button class="addb" onclick="addE()">+ Add Education</button>
  </div>
  <!-- SKILLS -->
  <div class="panel" id="p-skills">
    <div class="sec-h">Skills &amp; Technologies</div>
    <div class="sk-row">
      <input id="ski" placeholder="Type a skill, press Enter or Add" onkeydown="if(event.key==='Enter')addSk()">
      <button class="asm" onclick="addSk()">Add</button>
    </div>
    <div class="tags" id="sktags"></div>
    <label style="margin-bottom:9px;display:block">Quick-add popular skills:</label>
    <div class="tags ptags" id="skpre"></div>
  </div>
  <!-- PROJECTS -->
  <div class="panel" id="p-proj">
    <div class="sec-h">Projects</div>
    <div id="pjlist"></div>
    <button class="addb" onclick="addPj()">+ Add Project</button>
  </div>
  <!-- CERTS -->
  <div class="panel" id="p-certs">
    <div class="sec-h">Certifications &amp; Awards</div>
    <div id="clist"></div>
    <button class="addb" onclick="addC()">+ Add Certification</button>
  </div>
  <!-- DESIGN -->
  <div class="panel" id="p-design">
    <div class="sec-h">Design &amp; Layout</div>
    <label style="margin-bottom:10px;display:block">Color Theme</label>
    <div class="tgrid">
      <div class="th on" onclick="setT('t-classic',this)"><div class="sw" style="background:#1c1c2e"></div>Classic</div>
      <div class="th" onclick="setT('t-terra',this)"><div class="sw" style="background:#b84c2e"></div>Terracotta</div>
      <div class="th" onclick="setT('t-navy',this)"><div class="sw" style="background:#1b3a6b"></div>Navy</div>
      <div class="th" onclick="setT('t-green',this)"><div class="sw" style="background:#2d5a3d"></div>Forest</div>
      <div class="th" onclick="setT('t-slate',this)"><div class="sw" style="background:#3d4f6b"></div>Slate</div>
      <div class="th" onclick="setT('t-gold',this)"><div class="sw" style="background:#78350f"></div>Gold</div>
    </div>
    <label style="margin-bottom:11px;display:block">Show / Hide Sections</label>
    <div class="vr">
      <label><input type="checkbox" id="vs0" checked onchange="render()"> Summary</label>
      <label><input type="checkbox" id="vs1" checked onchange="render()"> Work Experience</label>
      <label><input type="checkbox" id="vs2" checked onchange="render()"> Education</label>
      <label><input type="checkbox" id="vs3" checked onchange="render()"> Skills</label>
      <label><input type="checkbox" id="vs4" checked onchange="render()"> Projects</label>
      <label><input type="checkbox" id="vs5" checked onchange="render()"> Certifications</label>
    </div>
  </div>
</aside>
<!-- PREVIEW -->
<main class="preview">
  <div class="plbl">&#9654; Live Preview (A4 Format)</div>
  <div id="rdoc">
    <div class="rh">
      <div class="rname" id="rn">Your Name</div>
      <div class="rtl" id="rjt"></div>
      <div class="rct" id="rct"></div>
    </div>
    <div class="rb" id="rb"></div>
  </div>
</main>
</div>
<div class="toast" id="toast"></div>
<script>
var S={works:[],edus:[],skills:[],projs:[],certs:[]};
var wid=0,eid=0,pid=0,cid=0;
var PRE=['JavaScript','Python','React','Node.js','TypeScript','SQL','AWS','Docker','Git','Java','C++','MongoDB','REST APIs','GraphQL','Kubernetes','Machine Learning','Excel','Figma','Communication','Leadership','Agile/Scrum'];

window.onload=function(){buildPre();addW();addE();render()};

function goTab(id,b){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on')});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});
  document.getElementById('p-'+id).classList.add('on');b.classList.add('on');
}

/* WORK */
function addW(){var id=wid++;S.works.push({id:id,title:'',co:'',loc:'',s:'',e:'',desc:''});buildW()}
function rmW(id){S.works=S.works.filter(function(w){return w.id!==id});buildW();render()}
function buildW(){
  var c=document.getElementById('wlist');c.innerHTML='';
  S.works.forEach(function(w,i){
    var d=document.createElement('div');d.className='card';
    d.innerHTML='<div class="ch"><span class="clbl">Experience #'+(i+1)+'</span><button class="rm" onclick="rmW('+w.id+')">&#215;</button></div>'
    +'<div class="fg"><label>Job Title</label><input placeholder="e.g. Software Engineer" value="'+e(w.title)+'" oninput="S.works['+i+'].title=this.value;render()"></div>'
    +'<div class="r2"><div class="fg"><label>Company</label><input placeholder="Company Name" value="'+e(w.co)+'" oninput="S.works['+i+'].co=this.value;render()"></div>'
    +'<div class="fg"><label>Location</label><input placeholder="City, Country" value="'+e(w.loc)+'" oninput="S.works['+i+'].loc=this.value;render()"></div></div>'
    +'<div class="r2"><div class="fg"><label>Start</label><input placeholder="Jan 2022" value="'+e(w.s)+'" oninput="S.works['+i+'].s=this.value;render()"></div>'
    +'<div class="fg"><label>End</label><input placeholder="Dec 2024 / Present" value="'+e(w.e)+'" oninput="S.works['+i+'].e=this.value;render()"></div></div>'
    +'<div class="fg"><label>Achievements &amp; Responsibilities</label>'
    +'<textarea placeholder="&#8226; Led a team of 5 engineers...&#10;&#8226; Improved performance by 40%...&#10;&#8226; Built REST APIs for..." oninput="S.works['+i+'].desc=this.value;render()">'+e(w.desc)+'</textarea></div>';
    c.appendChild(d);
  });
}

/* EDU */
function addE(){var id=eid++;S.edus.push({id:id,deg:'',field:'',sch:'',s:'',en:'',gpa:''});buildE()}
function rmE(id){S.edus=S.edus.filter(function(x){return x.id!==id});buildE();render()}
function buildE(){
  var c=document.getElementById('elist');c.innerHTML='';
  S.edus.forEach(function(ed,i){
    var d=document.createElement('div');d.className='card';
    d.innerHTML='<div class="ch"><span class="clbl">Education #'+(i+1)+'</span><button class="rm" onclick="rmE('+ed.id+')">&#215;</button></div>'
    +'<div class="fg"><label>Degree</label><input placeholder="B.Tech / M.Sc / MBA" value="'+e(ed.deg)+'" oninput="S.edus['+i+'].deg=this.value;render()"></div>'
    +'<div class="fg"><label>Field of Study</label><input placeholder="Computer Science" value="'+e(ed.field)+'" oninput="S.edus['+i+'].field=this.value;render()"></div>'
    +'<div class="fg"><label>Institution</label><input placeholder="University / College Name" value="'+e(ed.sch)+'" oninput="S.edus['+i+'].sch=this.value;render()"></div>'
    +'<div class="r2"><div class="fg"><label>Start Year</label><input placeholder="2019" value="'+e(ed.s)+'" oninput="S.edus['+i+'].s=this.value;render()"></div>'
    +'<div class="fg"><label>End Year</label><input placeholder="2023" value="'+e(ed.en)+'" oninput="S.edus['+i+'].en=this.value;render()"></div></div>'
    +'<div class="fg"><label>GPA / Score</label><input placeholder="8.5/10 or 3.8/4.0" value="'+e(ed.gpa)+'" oninput="S.edus['+i+'].gpa=this.value;render()"></div>';
    c.appendChild(d);
  });
}

/* SKILLS */
function addSk(){var v=document.getElementById('ski').value.trim();if(v&&S.skills.indexOf(v)===-1){S.skills.push(v);document.getElementById('ski').value='';buildSk();render()}}
function rmSk(s){S.skills=S.skills.filter(function(x){return x!==s});buildSk();render()}
function buildSk(){document.getElementById('sktags').innerHTML=S.skills.map(function(s){return'<div class="tag">'+h(s)+'<span class="tx" onclick="rmSk(\''+e(s)+'\')">&#215;</span></div>'}).join('')}
function buildPre(){document.getElementById('skpre').innerHTML=PRE.map(function(s){return'<div class="tag" onclick="addPre(\''+s+'\')">'+s+'</div>'}).join('')}
function addPre(s){if(S.skills.indexOf(s)===-1){S.skills.push(s);buildSk();render()}}

/* PROJECTS */
function addPj(){var id=pid++;S.projs.push({id:id,name:'',tech:'',link:'',desc:''});buildPj()}
function rmPj(id){S.projs=S.projs.filter(function(p){return p.id!==id});buildPj();render()}
function buildPj(){
  var c=document.getElementById('pjlist');c.innerHTML='';
  S.projs.forEach(function(p,i){
    var d=document.createElement('div');d.className='card';
    d.innerHTML='<div class="ch"><span class="clbl">Project #'+(i+1)+'</span><button class="rm" onclick="rmPj('+p.id+')">&#215;</button></div>'
    +'<div class="fg"><label>Project Name</label><input placeholder="e.g. E-Commerce Platform" value="'+e(p.name)+'" oninput="S.projs['+i+'].name=this.value;render()"></div>'
    +'<div class="fg"><label>Technologies</label><input placeholder="React, Node.js, MongoDB" value="'+e(p.tech)+'" oninput="S.projs['+i+'].tech=this.value;render()"></div>'
    +'<div class="fg"><label>Link (optional)</label><input placeholder="github.com/user/project" value="'+e(p.link)+'" oninput="S.projs['+i+'].link=this.value;render()"></div>'
    +'<div class="fg"><label>Description</label><textarea placeholder="What did this do? Your role? Impact?" oninput="S.projs['+i+'].desc=this.value;render()">'+e(p.desc)+'</textarea></div>';
    c.appendChild(d);
  });
}

/* CERTS */
function addC(){var id=cid++;S.certs.push({id:id,name:'',iss:'',date:''});buildC()}
function rmC(id){S.certs=S.certs.filter(function(c){return c.id!==id});buildC();render()}
function buildC(){
  var c=document.getElementById('clist');c.innerHTML='';
  S.certs.forEach(function(cr,i){
    var d=document.createElement('div');d.className='card';
    d.innerHTML='<div class="ch"><span class="clbl">Item #'+(i+1)+'</span><button class="rm" onclick="rmC('+cr.id+')">&#215;</button></div>'
    +'<div class="fg"><label>Name</label><input placeholder="AWS Certified Solutions Architect" value="'+e(cr.name)+'" oninput="S.certs['+i+'].name=this.value;render()"></div>'
    +'<div class="r2"><div class="fg"><label>Issuer</label><input placeholder="Amazon Web Services" value="'+e(cr.iss)+'" oninput="S.certs['+i+'].iss=this.value;render()"></div>'
    +'<div class="fg"><label>Date</label><input placeholder="Mar 2024" value="'+e(cr.date)+'" oninput="S.certs['+i+'].date=this.value;render()"></div></div>';
    c.appendChild(d);
  });
}

/* THEME */
function setT(cls,el){document.body.className=cls;document.querySelectorAll('.th').forEach(function(t){t.classList.remove('on')});el.classList.add('on')}

/* HELPERS */
function v(id){var el=document.getElementById(id);return el?el.value.trim():''}
function cb(id){var el=document.getElementById(id);return el?el.checked:true}
function h(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function e(s){return String(s||'').replace(/"/g,'&quot;')}

/* RENDER */
function render(){
  var name=v('fn')||'Your Name',jt=v('ft'),em=v('fe'),ph=v('fp'),loc=v('fl'),li=v('fli'),gh=v('fg2'),web=v('fw'),sum=v('fs');
  document.getElementById('rn').textContent=name;
  var rjt=document.getElementById('rjt');rjt.textContent=jt;rjt.style.display=jt?'':'none';
  var ci=[];
  if(em)  ci.push('<div class="ci">&#9993; '+h(em)+'</div>');
  if(ph)  ci.push('<div class="ci">&#9742; '+h(ph)+'</div>');
  if(loc) ci.push('<div class="ci">&#9679; '+h(loc)+'</div>');
  if(li)  ci.push('<div class="ci">in '+h(li)+'</div>');
  if(gh)  ci.push('<div class="ci">&#9670; '+h(gh)+'</div>');
  if(web) ci.push('<div class="ci">&#9675; '+h(web)+'</div>');
  document.getElementById('rct').innerHTML=ci.join('');

  var out='';
  /* summary */
  if(cb('vs0')&&sum) out+='<div class="rs"><div class="rst">Professional Summary</div><div class="rsum">'+h(sum)+'</div></div>';
  /* work */
  if(cb('vs1')){var fw=S.works.filter(function(w){return w.title||w.co});
    if(fw.length){out+='<div class="rs"><div class="rst">Work Experience</div>';
      fw.forEach(function(w){var dt=[w.s,w.e].filter(Boolean).join(' \u2013 ');var bl=w.desc.trim().split('\n').filter(Boolean);
        out+='<div class="wi"><div class="wh"><div class="wtl">'+h(w.title)+'</div>'+(dt?'<div class="wdt">'+h(dt)+'</div>':'')+'</div>'
        +'<div class="wco">'+h(w.co)+(w.loc?'\u00b7 '+h(w.loc):'')+'</div>'
        +(bl.length?'<ul class="wbul">'+bl.map(function(b){return'<li>'+h(b.replace(/^[•\-\*]\s*/,''))+'</li>'}).join('')+'</ul>':'')+'</div>';});
      out+='</div>';}}
  /* edu */
  if(cb('vs2')){var fe=S.edus.filter(function(ed){return ed.deg||ed.sch});
    if(fe.length){out+='<div class="rs"><div class="rst">Education</div>';
      fe.forEach(function(ed){var yr=[ed.s,ed.en].filter(Boolean).join(' \u2013 ');
        out+='<div class="ei"><div class="edg">'+h(ed.deg)+(ed.field?' in '+h(ed.field):'')+'</div>'
        +'<div class="esc">'+h(ed.sch)+'</div><div class="edt">'+yr+(ed.gpa?' \u00b7 GPA: '+h(ed.gpa):'')+'</div></div>';});
      out+='</div>';}}
  /* skills */
  if(cb('vs3')&&S.skills.length){out+='<div class="rs"><div class="rst">Skills &amp; Technologies</div><div class="skg">';
    S.skills.forEach(function(s){out+='<div class="ski"><div class="skd"></div>'+h(s)+'</div>'});out+='</div></div>';}
  /* projects */
  if(cb('vs4')){var fp=S.projs.filter(function(p){return p.name});
    if(fp.length){out+='<div class="rs"><div class="rst">Projects</div>';
      fp.forEach(function(p){out+='<div class="pji"><div class="pjn">'+h(p.name)+(p.link?'<span style="font-size:10.5px;font-weight:400;color:#888"> \u00b7 '+h(p.link)+'</span>':'')+'</div>'
        +(p.tech?'<div class="pjt">'+h(p.tech)+'</div>':'')+(p.desc?'<div class="pjd">'+h(p.desc)+'</div>':'')+'</div>';});out+='</div>';}}
  /* certs */
  if(cb('vs5')){var fc=S.certs.filter(function(c){return c.name});
    if(fc.length){out+='<div class="rs"><div class="rst">Certifications &amp; Awards</div>';
      fc.forEach(function(c){out+='<div class="cri"><div><div class="crn">'+h(c.name)+'</div>'+(c.iss?'<div class="cr2">'+h(c.iss)+'</div>':'')+'</div>'
        +(c.date?'<div class="cr2" style="white-space:nowrap;font-family:\'Courier New\',monospace">'+h(c.date)+'</div>':'')+'</div>';});out+='</div>';}}
  document.getElementById('rb').innerHTML=out;
  prog();
}

function prog(){
  var sc=0;
  if(v('fn'))sc+=15;if(v('fe'))sc+=10;if(v('ft'))sc+=10;if(v('fs'))sc+=15;
  if(S.works.some(function(w){return w.title}))sc+=20;
  if(S.edus.some(function(ed){return ed.deg}))sc+=15;
  if(S.skills.length>2)sc+=10;
  if(S.projs.some(function(p){return p.name}))sc+=5;
  sc=Math.min(sc,100);
  document.getElementById('pfill').style.width=sc+'%';
  document.getElementById('ppct').textContent=sc+'%';
}

function doPrint(){toast('Opening print dialog \u2014 select "Save as PDF"');setTimeout(function(){window.print()},400)}

function resetAll(){
  if(!confirm('Reset all data?'))return;
  document.querySelectorAll('#p-basics input,#p-basics textarea').forEach(function(el){el.value=''});
  S.works=[];S.edus=[];S.skills=[];S.projs=[];S.certs=[];
  wid=eid=pid=cid=0;
  buildW();buildE();buildPj();buildC();buildSk();addW();addE();render();toast('Reset done.');
}

var _tt;
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('show')},3000)}
</script>
</body>
</html>
